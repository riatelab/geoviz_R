home:
  title: "geoviz: thematic cartography"
  description: >
    This package is an implementation of the geoviz javascript library. can be used to create a wide range of interactive, zoomable vector maps, taking advantage of d3’s many features: proportional symbols, pictograms, typologies, choropleth maps, spikes, tiles, Dorling cartograms, etc. It can also be used to create pretty static vectorial maps in SVG format, suitable for editorial cartography.

url: https://neocarto.github.io/geoviz_R/

template:
  bootstrap: 5
  bslib:
    base_font: {google: "Atkinson Hyperlegible"}
    heading_font: {google: "Atkinson Hyperlegible"}
    code_font: {google: "Fira Code"}
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "geoviz: thematic cartography"
navbar:
  structure:
    left: [home, start, documentation, reference, about]

  components:
    documentation:
      text: Documentation
      menu:
        - text: "Create and render"
          href: articles/create_render.html
        - text: "Display a basemap"
          href: articles/display_geom.html
        - text: "Marks"
          href: articles/marks.html
        - text: "Projections"
          href: articles/projections.html
        - text: "Interactivity"
          href: articles/interactivity.html
        - text: "Layout"
          href: articles/layout.html
        - text: "Symbology"
          href: articles/symbology.html
        - text: "Symbology (advanced)"
          href: articles/symbology2.html
        - text: "Legends"
