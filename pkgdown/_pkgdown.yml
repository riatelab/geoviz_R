      text: Get started
      href: articles/hello_geoviz.html

reference:
  - title: "Create & render"
    desc: The functions `viz_create` and `viz_render` are essential for initializing a map, visualizing its content, and exporting it. They form the core workflow for creating maps with the `geoviz` R package.
    contents:
    - viz_create
    - viz_render
    - viz_save
  - title: "Base Map and Structure"
    desc: Functions that define the map’s geographic content, including outlines, tiles, and graticules.
    contents:
    - viz_path
    - viz_outline
    - viz_graticule
    - viz_rhumbs
    - viz_tissot
    - viz_earth
    - viz_tile
  - title: "Map Decorations and Annotations"
    desc: Functions for styling and annotating the map, such as titles, scale bars, and north arrows.
    contents:
    - viz_header
    - viz_footer
    - viz_north
    - viz_scalebar
    - viz_text
  - title: "Thematic"
    desc: These functions allow the creation of thematic maps based on statistical data, complete with their associated legends.
    contents:
    - viz_prop
    - viz_choro
    - viz_typo
    - viz_propchoro
    - viz_proptypo
    - viz_picto
  - title: "Thematic (advanced)"
    desc: These functions allow the creation of advanced thematic maps based on statistical data, complete with their associated legends.
    contents:
    - viz_gridprop
    - viz_gridchoro
    - viz_smooth
    - viz_dotdensity
  - title: "marks"
    desc: Behind the symbolization functions, there are elementary graphical marks. In geoviz, it is possible to use them directly.
    contents:
    - viz_circle
    - viz_square
    - viz_spike
    - viz_halfcircle
    - viz_symbol
  - title: "effects"
    desc: Since the maps created are in SVG format, it is possible to apply filters to them. These functions offer four different options for doing so.
    contents:
    - viz_shadow
    - viz_blur
    - viz_clipPath
    - viz_radialGradient
    - viz_pattern
    - viz_sketch
  - title: "Legends"
    desc: Functions to design map legends
    contents:
    - viz_leg_box
    - viz_leg_typo_vertical
    - viz_leg_typo_horizontal
    - viz_leg_choro_horizontal
    - viz_leg_choro_vertical
    - viz_leg_gradient_vertical
    - viz_leg_spikes
    - viz_leg_circles
    - viz_leg_circles_nested
    - viz_leg_squares
    - viz_leg_squares_nested
    - viz_leg_mushrooms
    - viz_leg_symbol_vertical
    - viz_leg_symbol_horizontal
figures:
  dev: grDevices::png
  fig.asp: 1
  fig.width: 6
  dpi: 96

footer:
  structure:
